# =============================================================
# Wonder Platform — Nginx 反向代理配置
# 阿里云香港轻量应用服务器（HTTP 公网 IP 版，无域名/SSL）
# 部署路径：/etc/nginx/sites-available/wonder_platform
# =============================================================

# ── Wonder Hub 主入口（C端，端口 80）────────────────────────────
server {
    listen 80;
    server_name _;   # 匹配任意主机名（公网 IP 直接访问）

    # 日志
    access_log /var/log/nginx/wonder_access.log;
    error_log  /var/log/nginx/wonder_error.log;

    # 文件上传大小限制（收据图片）
    client_max_body_size 20M;

    # ── 后端 API 代理（去掉 /api 前缀）──────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # 金融数据接口可能查询较慢，放宽超时
        proxy_read_timeout    300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
    }

    # ── 收据静态文件代理 ─────────────────────────────────────────
    location /receipts/ {
        proxy_pass       http://127.0.0.1:8000/receipts/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── 月结单静态文件代理 ───────────────────────────────────────
    location /statements/ {
        proxy_pass       http://127.0.0.1:8000/statements/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Wonder Hub（Next.js）主体 ────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # 开启 gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}

# =============================================================
# 注意：Company Admin (5174) 和 FIS Hub (5175) 使用 Vite preview
# 内置代理，直接通过端口访问，无需 Nginx 额外配置。
#
# 访问地址（将 YOUR_IP 替换为实际公网 IP）：
#   Wonder Hub   → http://YOUR_IP/
#   Company Admin → http://YOUR_IP:5174/
#   FIS Hub      → http://YOUR_IP:5175/
#   后端健康检查  → http://YOUR_IP/api/health
#
# 如将来绑定域名并启用 HTTPS，使用 certbot 命令：
#   certbot --nginx -d yourdomain.com -d company.yourdomain.com
# =============================================================
