# =============================================================
# Wonder Platform — Nginx 反向代理配置 v2（域名 + HTTPS 版）
# 域名：wonderwisdom.online
# 服务器：阿里云香港轻量应用服务器 47.239.63.70
# 部署路径：/etc/nginx/sites-available/wonder_platform
# =============================================================

# ── [1] HTTP → HTTPS 强制跳转（证书申请后启用，现阶段注释掉）──────
# server {
#     listen 80;
#     server_name wonderwisdom.online www.wonderwisdom.online
#                 company.wonderwisdom.online fis.wonderwisdom.online;
#     return 301 https://$host$request_uri;
# }

# ── [2] Wonder Hub 主入口（C端主站）────────────────────────────────
# 访问路径：http://wonderwisdom.online  （HTTPS 配好后改为 443）
server {
    listen 80;
    server_name wonderwisdom.online www.wonderwisdom.online _;

    # HTTPS 证书（申请后由 certbot 自动填入，或手动取消注释）
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/ssl/wonderwisdom.online.pem;
    # ssl_certificate_key /etc/nginx/ssl/wonderwisdom.online.key;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/wonder_access.log;
    error_log  /var/log/nginx/wonder_error.log;
    client_max_body_size 20M;

    # ── 后端 API 代理（去掉 /api 前缀转发到 uvicorn）──────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
    }

    # ── 收据静态文件 ─────────────────────────────────────────────
    location /receipts/ {
        proxy_pass       http://127.0.0.1:8000/receipts/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── 月结单静态文件 ───────────────────────────────────────────
    location /statements/ {
        proxy_pass       http://127.0.0.1:8000/statements/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Wonder Hub（Next.js SSR）主体 ────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}

# ── [3] Company Admin B端（子域名路由）────────────────────────────
# 访问路径：http://company.wonderwisdom.online
server {
    listen 80;
    server_name company.wonderwisdom.online;

    # HTTPS 证书（申请后启用）
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/ssl/company.wonderwisdom.online.pem;
    # ssl_certificate_key /etc/nginx/ssl/company.wonderwisdom.online.key;

    access_log /var/log/nginx/company_admin_access.log;
    error_log  /var/log/nginx/company_admin_error.log;
    client_max_body_size 20M;

    # ── API 代理（company-admin 的 /api 请求也指向统一后端）──────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
    }

    location /receipts/ {
        proxy_pass       http://127.0.0.1:8000/receipts/;
        proxy_set_header Host $host;
    }

    location /statements/ {
        proxy_pass       http://127.0.0.1:8000/statements/;
        proxy_set_header Host $host;
    }

    # ── Company Admin（Vite 静态文件）───────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}

# ── [4] FIS Hub 金融沙盘（子域名路由）─────────────────────────────
# 访问路径：http://fis.wonderwisdom.online
server {
    listen 80;
    server_name fis.wonderwisdom.online;

    # HTTPS 证书（申请后启用）
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/ssl/fis.wonderwisdom.online.pem;
    # ssl_certificate_key /etc/nginx/ssl/fis.wonderwisdom.online.key;

    access_log /var/log/nginx/fis_hub_access.log;
    error_log  /var/log/nginx/fis_hub_error.log;

    # ── API 代理（FIS 的 /api 请求转发到统一后端）────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
    }

    # ── FIS Hub（Vite 静态文件）─────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5175;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}

