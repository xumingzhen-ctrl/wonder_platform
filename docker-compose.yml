version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ENVIRONMENT=development
    restart: unless-stopped

  wonder-hub:
    build:
      context: ./apps/wonder-hub
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/wonder-hub:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped

  company-admin:
    build:
      context: ./apps/company-admin
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/company-admin:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped
